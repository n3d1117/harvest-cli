version: 2

project_name: harvest

before:
  hooks:
    - go test ./...

builds:
  - id: harvest
    main: ./cmd/harvest
    binary: harvest
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: harvest
    ids:
      - harvest
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  draft: false
  prerelease: auto
